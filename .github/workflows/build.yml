name: Build and test

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Compile Java 8 bytecode
        run: |
          rm -rf build/classes
          mkdir -p build/classes
          javac --release 8 -encoding UTF-8 \
            -cp 'dist/lib/AbsoluteLayout.jar' \
            -d build/classes src/*.java tests/*.java
          cp src/about.html build/classes/about.html
      - name: Run tests
        run: java -Djava.awt.headless=true -cp 'build/classes:dist/lib/AbsoluteLayout.jar' TestRunner
      - name: CLI smoke test
        run: java -cp 'build/classes:dist/lib/AbsoluteLayout.jar' Cli --help
