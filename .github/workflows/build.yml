name: Build & Release

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile sources (Java 8 target)
        run: |
          mkdir -p build/classes
          javac --release 8 -Xlint:all -Werror -d build/classes -cp "dist/lib/AbsoluteLayout.jar" src/*.java
          cp src/about.html src/about-en.html build/classes/
          mkdir -p build/classes/icon
          cp src/icon/schedulerfiles.png src/icon/schedulerfiles.ico build/classes/icon/

      - name: Compile tests
        run: |
          javac --release 8 -Xlint:all -Werror -d build/classes -cp "build/classes:dist/lib/AbsoluteLayout.jar" tests/*.java

      - name: Run tests
        run: java -cp "build/classes:dist/lib/AbsoluteLayout.jar" TestRunner

      - name: Package JAR
        run: |
          mkdir -p build/jar/lib
          cp dist/lib/AbsoluteLayout.jar build/jar/lib/
          find build/classes -maxdepth 1 -name '*.class' ! -name '*Test*.class' -exec cp {} build/jar/ \;
          cp build/classes/about.html build/classes/about-en.html build/jar/
          mkdir -p build/jar/icon
          cp build/classes/icon/schedulerfiles.png build/classes/icon/schedulerfiles.ico build/jar/icon/
          jar cfm dist/SchedulerFiles.jar build/Manifest.txt -C build/jar .

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SchedulerFiles
          path: dist/SchedulerFiles.jar

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: SchedulerFiles
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SchedulerFiles.jar
          generate_release_notes: true
